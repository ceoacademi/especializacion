<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificación de Certificados</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

/* 🔹 CONTENEDOR GENERAL */

.mainContainer{
    max-width:1150px;
    margin:20px auto;
    padding:20px;
}

/* 🔹 BANNER SUPERIOR */

.banner{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.08);
    margin-bottom:40px;
}

.banner img{
    width:100%;
    border-radius:12px;
    display:block;
}

/* 🔹 PANTALLA INICIAL */

#inicioBox{
    max-width:700px;
    margin:auto;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.header{
    background:#0d2c6c;
    color:white;
    text-align:center;
    padding:30px 20px;
}

.header h1{
    margin:0;
    font-size:32px;
}

.header p{
    margin-top:10px;
    font-size:18px;
}

.content{
    padding:30px;
}

label{
    font-size:22px;
    font-weight:bold;
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    border:2px solid #cfd8e3;
    font-size:18px;
    box-sizing:border-box;
}

button{
    margin-top:30px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0d2c6c;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#123a8f;
}

.info{
    margin-top:25px;
    background:#eef5ff;
    padding:20px;
    border-radius:10px;
}

.error{
    color:red;
    margin-top:15px;
    display:none;
    font-weight:bold;
}

/* 🔹 VISOR PDF */

#visorPagina{
    display:none;
    height:100vh;
    background:white;
}

.topbar{
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-bottom:1px solid #ddd;
    background:white;
}

.topbar img{
    height:55px;
    cursor:pointer;
}

#pdfViewer{
    width:100%;
    height:calc(100vh - 80px);
    border:none;
}

/* 🔹 CELULAR */

@media(max-width:700px){

    .mainContainer{
        padding:10px;
    }

    .header h1{
        font-size:24px;
    }

    .header p{
        font-size:16px;
    }

    .topbar img{
        height:45px;
    }

}

</style>
</head>

<body>

<!-- 🔹 INICIO -->

<div id="inicio">

    <div class="mainContainer">

        <!-- 🔹 BANNER SUPERIOR -->

        <div class="banner">

            <img
                src="logo-v.png"
                alt="Banner"
            >

        </div>

        <!-- 🔹 CAJA VERIFICACIÓN -->

        <div id="inicioBox">

            <div class="header">

                <h1>Verificación de Certificados</h1>

                <p>
                    Ingrese el código para validar la autenticidad de su certificado
                </p>

            </div>

            <div class="content">

                <label>Código de Verificación</label>

                <input
                    type="text"
                    id="codigo"
                    placeholder="Ej: CEO1001"
                >

                <button onclick="verificarPDF()">
                    Verificar
                </button>

                <div class="error" id="error">
                    Certificado no encontrado
                </div>

                <div class="info">

                    <h3>¿Dónde encontrar el código?</h3>

                    <p>
                        El código se encuentra en la parte inferior del certificado digital o impreso.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- 🔹 VISOR PDF -->

<div id="visorPagina">

    <div class="topbar">

        <a href="#" onclick="volverInicio()">

            <img src="logo.png" alt="Logo">

        </a>

    </div>

    <iframe id="pdfViewer"></iframe>

</div>

<script>

function verificarPDF(){

    let codigo =
    document.getElementById("codigo").value.trim();

    if(codigo === ""){
        return;
    }

    let pdfURL = codigo + ".pdf";

    fetch(pdfURL)

    .then(response => {

        if(response.ok){

            document.getElementById("inicio").style.display = "none";

            document.getElementById("visorPagina").style.display = "block";

            document.getElementById("pdfViewer").src =
            "https://docs.google.com/gview?url=https://ceoacademi.github.io/especializacion/"
            + pdfURL +
            "&embedded=true";

            document.getElementById("error").style.display = "none";

        }else{

            document.getElementById("error").style.display = "block";

        }

    });

}

function volverInicio(){

    document.getElementById("inicio").style.display = "block";

    document.getElementById("visorPagina").style.display = "none";

    document.getElementById("pdfViewer").src = "";

}

</script>

</body>
</html>
