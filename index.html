<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CEOACADEMY</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      padding: 15px;
      border-bottom: 1px solid #ccc;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    header img {
      height: 60px;
    }

    .pdf-container {
      width: 100%;
      height: calc(100vh - 90px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 🔹 Ajuste para celular */
    @media (max-width: 600px) {
      header img {
        height: 70px;
      }
    }
  </style>
</head>

<body>

  <!-- 🔹 LOGO CENTRADO Y CON LINK -->
  <header>
    <a href="https://elearning.ceoacademy.edu.pe/login/index.php" target="_blank">
      <img src="logo.png" alt="CEO Academy">
    </a>
  </header>

  <!-- 🔹 VISOR PDF (compatible con celular) -->
  <div class="pdf-container">
    <iframe src="https://docs.google.com/gview?url=https://ceoacademi.github.io/especializacion/Especializacion.pdf&embedded=true"></iframe>
  </div>

</body>
</html>
