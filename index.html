<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificación de Certificados</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

/* 🔹 PANTALLA INICIAL */

#inicio{
    max-width:700px;
    margin:50px auto;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.header{
    background:#0d2c6c;
    color:white;
    text-align:center;
    padding:30px 20px;
}

.header h1{
    margin:0;
    font-size:32px;
}

.header p{
    margin-top:10px;
    font-size:18px;
}

.content{
    padding:30px;
}

label{
    font-size:22px;
    font-weight:bold;
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    border:2px solid #cfd8e3;
    font-size:18px;
    box-sizing:border-box;
}

button{
    margin-top:30px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0d2c6c;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#123a8f;
}

.info{
    margin-top:25px;
    background:#eef5ff;
    padding:20px;
    border-radius:10px;
}

.error{
    color:red;
    margin-top:15px;
    display:none;
    font-weight:bold;
}

/* 🔹 VISOR PDF */

#visorPagina{
    display:none;
    height:100vh;
    background:white;
}

.topbar{
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-bottom:1px solid #ddd;
    background:white;
}

.topbar img{
    height:55px;
}

#pdfViewer{
    width:100%;
    height:calc(100vh - 80px);
    border:none;
}

/* 🔹 CELULAR */

@media(max-width:600px){

    .header h1{
        font-size:24px;
    }

    .header p{
        font-size:16px;
    }

    .topbar img{
        height:45px;
    }

}

</style>
</head>

<body>

<!-- 🔹 PANTALLA INICIAL -->

<div id="inicio">

    <div class="header">
        <h1>Verificación de Certificados</h1>

        <p>
            Ingrese el código para validar la autenticidad de su certificado
        </p>
    </div>

    <div class="content">

        <label>Código de Verificación</label>

        <input
            type="text"
            id="codigo"
            placeholder="Ej: CEO1001"
        >

        <button onclick="verificarPDF()">
            Verificar
        </button>

        <div class="error" id="error">
            Certificado no encontrado
        </div>

        <div class="info">
            <h3>¿Dónde encontrar el código?</h3>

            <p>
                El código se encuentra en la parte inferior del certificado digital o impreso.
            </p>
        </div>

    </div>

</div>

<!-- 🔹 PÁGINA PDF -->

<div id="visorPagina">

    <div class="topbar">

        <a href="https://ceoacademy.edu.pe/programas/especializaciones-asincronas/mecanica-de-suelos-con-fines-de-pavimentacion-a/" target="_blank">

            <img src="logo.png">

        </a>

    </div>

    <iframe id="pdfViewer"></iframe>

</div>

<script>

function verificarPDF(){

    let codigo =
    document.getElementById("codigo").value.trim();

    if(codigo === ""){
        return;
    }

    let pdfURL = codigo + ".pdf";

    fetch(pdfURL)

    .then(response => {

        if(response.ok){

            // 🔹 OCULTAR INICIO
            document.getElementById("inicio").style.display = "none";

            // 🔹 MOSTRAR VISOR
            document.getElementById("visorPagina").style.display = "block";

            // 🔹 PDF COMPATIBLE CELULAR
            document.getElementById("pdfViewer").src =
            "https://docs.google.com/gview?url=https://ceoacademi.github.io/especializacion/"
            + pdfURL +
            "&embedded=true";

        }else{

            document.getElementById("error").style.display = "block";

        }

    });

}

</script>

</body>
</html>
